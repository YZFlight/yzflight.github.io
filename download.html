<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>下载站 - YZFLIGHT 远征飞行 - 高速 免费 免登录</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh; /* 设置视口高度 */
}

.browser {
  width: 100%;
  height: auto; /* 自动填充高度以适应屏幕 */
  background-color: #f5f5f5;
  border: 1px solid #ccc;
  box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
  overflow: hidden; /* 隐藏滚动条 */
}

@media (min-width: 600px) { /* 对于较大的屏幕，添加一些基础样式 */
  .browser {
    padding: 1rem;
  }
}

.default-link {
  display: none; /* 默认隐藏，通过JavaScript动态显示 */
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  color: white;
  text-decoration: none;
}

@media (max-width: 599px) { /* 当屏幕宽度小于600px时显示默认链接 */
  .browser {
    width: 100%; /* 宽度不变 */
  }
  .default-link {
    display: block;
  }
}
</style>

<script>
window.addEventListener('DOMContentLoaded', function() {
  // 如果是桌面环境，设置默认链接
  if (!/mobile/i.test(navigator.userAgent)) {
    document.querySelector('.default-link').href = 'https://fpv.fanyy.love/';
  }
});
</script>
</head>
<body>
<div class="container">
  <div class="browser" id="browser">
    <!-- 这里需要一个简单的浏览器样式的占位符 -->
    <div style="width: 40px; height: 40px; border-radius: 50%; background: url('path/to/browser-icon.png') no-repeat;"></div>
  </div>
  <a href="#" class="default-link">前往 https://fpv.fanyy.love/</a>
</div>
</body>
</html>
